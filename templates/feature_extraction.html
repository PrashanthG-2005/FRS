{% extends "layout.html" %}

{% block content %}
<div class="text-center">
    <h4 class="text-primary font-weight-bold">Feature Extraction</h4>
    <p class="text-muted small">Dark feature-map style images</p>
    
    <div class="row row-cols-2 row-cols-md-5 g-4">
        {% for i in range(1, 11) %}
        <div class="col mb-4">
            <div class="card h-100 shadow-sm border-0 bg-dark overflow-hidden">
                <img src="{{ url_for('static', filename='face_data/' + reg_no + '/face_' + i|string + '.jpg') }}" 
                     class="card-img-top" alt="Features {{ i }}" 
                     style="filter: invert(1) grayscale(100%); opacity: 0.8;"
                     onerror="this.src='https://placehold.co/150x150/111111/444444?text=Feature+{{ i }}'">
                <div class="card-body p-2 text-center bg-black text-primary">
                    <span class="small font-weight-bold">MAP_{{ i }}</span>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    
    <div class="mt-5">
        <a href="{{ url_for('classification', reg_no=reg_no) }}" class="btn btn-primary px-5">Continue</a>
    </div>
</div>
{% endblock %}
